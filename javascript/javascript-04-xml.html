<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,th,td{
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Mostrar información</h1>
    <button onclick="cargar_informacion()">Cargar información</button>
    <table id="tabla">
        <tr>
            <td>1</td>
            <td>2</td>
            <tr>
                <td>1</td>
                <td>2</td>
            </tr>
        </tr>
    </table>
    <script>
        let datos=["nombre", "password", "john", 123, "jane", 456];
        function cargar_informacion() {
            let tabla=document.getElementById("tabla")
            // tabla.innerHTML="<tr>"
            let t = "<tr>"
            let contador = 0
            for (const key in datos) {
                const element = datos[key];
                t += "<td>" + element + "</td>"
                contador++
                if (contador == 2)
                t += "</tr>"
                contador = 1
            }
        }
        tabla.innerHTML = t + "</tr>"
        // tabla.innerHTML += "</tr>"
        // tabla.innerHTML += "<tr>hola</tr>"
    </script>
</body>
</html>
